<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLoanMaster – Free Mortgage, Loan & Financial Calculators</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="MyLoanMaster – Free online financial calculators: mortgage, affordability, investment, debt payoff, and percentage tools. Fast, private, and mathematically precise." />
    <meta name="keywords" content="mortgage calculator, loan calculator, affordability planner, investment visualizer, debt strategist, percentage calculator, financial tools, free loan calculator, mortgage payment estimator" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.myloanmaster.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="MyLoanMaster – Free Financial Calculators" />
    <meta property="og:description" content="5 powerful financial tools: mortgage, affordability, investment, debt payoff, and percentage calculators. All free, all private." />
    <meta property="og:url" content="https://www.myloanmaster.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MyLoanMaster" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MyLoanMaster – Free Financial Calculators" />
    <meta name="twitter:description" content="Mortgage, affordability, investment, debt, and percentage calculators — all free in your browser." />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <!-- JSON-LD: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MyLoanMaster",
      "url": "https://www.myloanmaster.com/",
      "description": "Free financial calculator suite with mortgage, affordability, investment, debt payoff, and percentage tools.",
      "applicationCategory": "FinanceApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <!-- JSON-LD: HowTo -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to Calculate Your Monthly Mortgage Payment",
        "step": [
          { "@type": "HowToStep", "text": "Open the Mortgage Calculator tab on MyLoanMaster." },
          { "@type": "HowToStep", "text": "Enter your loan amount, annual interest rate, and loan term in years." },
          { "@type": "HowToStep", "text": "View your monthly payment, total interest, and amortization schedule instantly." }
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to Find Out How Much House You Can Afford",
        "step": [
          { "@type": "HowToStep", "text": "Navigate to the Affordability Planner tab." },
          { "@type": "HowToStep", "text": "Enter your annual income, monthly debts, and planned down payment." },
          { "@type": "HowToStep", "text": "See your maximum affordable home price based on the 28/36 rule." }
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to Plan Your Debt Payoff Strategy",
        "step": [
          { "@type": "HowToStep", "text": "Go to the Debt Strategist tab." },
          { "@type": "HowToStep", "text": "Add your debts with balances, interest rates, and minimum payments." },
          { "@type": "HowToStep", "text": "Compare avalanche vs snowball methods and see total interest savings." }
        ]
      }
    ]
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How do I calculate my monthly mortgage payment?",
          "acceptedAnswer": { "@type": "Answer", "text": "Use the Mortgage Calculator on MyLoanMaster. Enter your loan amount, interest rate, and term. The tool instantly calculates your monthly payment using the standard amortization formula: M = P[r(1+r)^n]/[(1+r)^n-1]." }
        },
        {
          "@type": "Question",
          "name": "How much house can I afford?",
          "acceptedAnswer": { "@type": "Answer", "text": "Use the Affordability Planner. Input your income, debts, and down payment. The calculator uses the 28/36 rule to estimate your maximum home price based on your debt-to-income ratio." }
        },
        {
          "@type": "Question",
          "name": "How does compound interest affect my investments?",
          "acceptedAnswer": { "@type": "Answer", "text": "The Investment Visualizer shows how your money grows over time with compound interest. Enter your initial investment, monthly contribution, and expected annual return rate to see detailed growth projections and charts." }
        },
        {
          "@type": "Question",
          "name": "What is the best way to pay off debt?",
          "acceptedAnswer": { "@type": "Answer", "text": "The Debt Strategist compares the avalanche method (highest interest first) and snowball method (smallest balance first). Enter your debts and it shows you the fastest payoff strategy and total interest savings for each approach." }
        },
        {
          "@type": "Question",
          "name": "Is MyLoanMaster free to use?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. MyLoanMaster is 100% free. All calculations run locally in your browser using JavaScript — no data is sent to any server." }
        },
        {
          "@type": "Question",
          "name": "Is my financial data private?",
          "acceptedAnswer": { "@type": "Answer", "text": "Absolutely. All calculations happen entirely in your browser. No personal or financial data is stored, transmitted, or shared with any third party." }
        },
        {
          "@type": "Question",
          "name": "Can I use MyLoanMaster on my phone?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. MyLoanMaster is fully responsive and works on all devices — desktop, tablet, and mobile. All tools adapt to your screen size for a seamless experience." }
        },
        {
          "@type": "Question",
          "name": "How accurate are the calculations?",
          "acceptedAnswer": { "@type": "Answer", "text": "MyLoanMaster uses standard financial formulas for all calculations. While we strive for mathematical precision, results should be used for estimation purposes. Consult a financial professional for exact figures." }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
